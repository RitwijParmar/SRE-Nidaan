substitutions:
  _REGION: us-east4
  _REPO: sre-nidaan
  _TAG: manual
  _NEXT_PUBLIC_API_URL: http://localhost:8001
  _NEXT_PUBLIC_CANONICAL_HOST: ""
  _NEXT_PUBLIC_BIND_ALIAS_HOST: ""

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/sre-nidaan-body:${_TAG}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - frontend/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg
      - NEXT_PUBLIC_CANONICAL_HOST=${_NEXT_PUBLIC_CANONICAL_HOST}
      - --build-arg
      - NEXT_PUBLIC_BIND_ALIAS_HOST=${_NEXT_PUBLIC_BIND_ALIAS_HOST}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/sre-nidaan-face:${_TAG}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - deploy/gcp/brain.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/sre-nidaan-brain:${_TAG}
      - .

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/sre-nidaan-body:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/sre-nidaan-face:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/sre-nidaan-brain:${_TAG}
